<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
</head>
<body>
        <!-- PARTNERS -->
    <section class="partners py-2" id="partners">
        <div class="container text-center mb-3">
            <h2 class="underlinedTitle center">
                <span class="underlined novoblue center">Our Partners</span>
            </h2>
        </div>

        <div class="owl-carousel owl-theme mt-5 mx-auto">
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href="https://www.business-angels.info/">
                            <img src="img/xmp.png" alt="xmp investors logo"
                                title="Xmp Investors Business Angels" />
                            <span>Xmp Investors Business Angels</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">XMP</h5>
                </div>
            </div>

            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href="https://www.afnor.org/en/">
                            <img src="img/afnor.png" alt="Afnor logo" title="Afnor" />
                            <span>Afnor</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">AFNOR</h5>
                </div>
            </div>

            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href="https://samba-investisseurs.fr/">
                            <img src="img/samba.jpg" alt="samba logo" title="SAMBA Investors" />
                            <span>SAMBA Investors</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">SAMBA</h5>
                </div>
            </div>
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href="https://www.poleaquimer.com/en/">
                            <img src="img/aquimer.png" alt="aquimer logo" title="Partner for innovation" />
                            <span>Aquimer Website</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">Aquimer</h5>
                </div>
            </div>
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href="https://www.agglo-boulonnais.fr/">
                            <img src="img/cab.png" alt="boulogne comune association logo"
                                title="Boulogne-sur-Mer City " />
                            <span>Boulogne-sur-Mer Website</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">C A B</h5>
                </div>
            </div>
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href=" https://www.pfinouvellesvagues.com/">
                            <img src="img/nouvelle-vagues.png" alt="nouvelle-vagues logo"
                                title="Innovation platform for seafood" />
                            <span>nouvelle-vagues Website</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">
                        Nouvelles
                        <br />
                        vagues
                    </h5>
                </div>
            </div>
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href=" https://www.inextenso.fr/en/">
                            <img src="img/InExtenso.jpg" alt="InExtenso logo" title="InExtenso Accounting" />
                            <span>InExtenso Website</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">In Extenso</h5>
                </div>
            </div>
            <div class="owl-item">
                <div class="card">
                    <div class="card-img">
                        <a href=" https://www.e.leclerc/ ">
                            <img src="img/Leclerc.jpg" alt="Leclerc logo" title="Leclerc supermarket" />
                            <span>Leclerc Website</span>
                        </a>
                    </div>
                    <h5 class="card-title name text-center">E Leclerc</h5>
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
